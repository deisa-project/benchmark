spack:
  concretizer:
    unify: true
  definitions:
    - packages:
        - cmake@3.30
        - ginkgo@1.9
        - googletest@1.14 +gmock
        - kokkos@4.7 +serial
        - kokkos-fft@0.4 host_backend=fftw-serial
        - kokkos-kernels@4.7
        - kokkos-tools
        - openblas@0.3
        - openmpi@5.0
        - paraconf@1.0
        - pdi@1.10.1:1.10
        - pdiplugin-decl-hdf5@1.10.1:1.10 +mpi
        - pdiplugin-decl-netcdf@1.10.1:1.10 +mpi
        - pdiplugin-mpi@1.10.1:1.10
        - pdiplugin-set-value@1.10.1:1.10
        - pdiplugin-trace@1.10.1:1.10
        - pdiplugin-pycall@1.10.1:1.10
    - python-packages:
        - py-dask
        - py-h5py
        - py-imageio@2.35
        - py-matplotlib@3.9
        - py-netcdf4@1.7 +mpi
        - py-numpy@2.1
        - py-pyyaml@6.0
        - py-scipy@1.14
        - py-sympy@1.13
        - py-xarray
        - py-bokeh
        - py-deisa-dask@0.6.2 +mpi
        - py-deisa-ray@0.1.7
        - py-iops-benchmark
  specs:
    - group: compiler
      specs:
        - gcc@14.2
    - group: app
      needs: [ compiler ]
      specs:
        - matrix:
            - [ $packages ]
            - [ "%gcc@14.2" ]
        - $python-packages
      override:
        packages:
          all:
            prefer:
              - target=x86_64_v3
  repos:
    builtin:
      branch: develop

  view:
    default:
      root: ./view
      projections:
        all: "{architecture.target}/{name}"

  mirrors:
    numpex-buildcache:
      url: oci://ghcr.io/numpex/spack-stack
      binary: true
      signed: false
      access_pair:
        id_variable: GITHUB_USER
        secret_variable: GITHUB_TOKEN

  config:
    install_tree:
      root: /opt/spack # path to the spack install dir. Important to keep /opt/spack for binary cache
      padded_length: 128

  packages:
    py-pandas:
      require: ~performance
